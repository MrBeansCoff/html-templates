<!--
A spinning stick of butter the easy way
-->

<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>360 ButterStick</title>

<style>
body {
 background: black;
 display: flex;
 align-items: center;
 justify-content: center;
 flex-direction: column;
}

img {
 inline-size: 50%;
}

.butterstick-container {
 display: flex;
 align-items: center;
 justify-content: center;
 width: 30%;
 height: auto;
 padding: 5px;
 animation: spinning-butter 3s linear infinite;
}

@keyframes spinning-butter {
 0% {
 transform: rotateY(0deg);
 }
 100% {
 transform: rotateY(8rad);
 }
}

.butter-bounce-container {
 display: flex;
}

.bounce1 {animation-delay: 0.1s; }
.bounce2 {animation-delay: 0.2s; }
.bounce3 {animation-delay: 0.3s; }
.bounce4 {animation-delay: 0.4s; }
.bounce5 {animation-delay: 0.5s; }
.bounce6 {animation-delay: 0.6s; }
.bounce7 {animation-delay: 0.7s; }
.bounce8 {animation-delay: 0.8s; }
.bounce9 {animation-delay: 0.9s; }
.bounce10 {animation-delay: 1s; }
.bounce11 {animation-delay: 1.1s; }
.bounce12 {animation-delay: 1.2s; }
.bounce13 {animation-delay: 1.3s; }
.bounce14 {animation-delay: 1.4s; }
.bounce15 {animation-delay: 1.6s; }

span {
 animation: unstuck-butter 2s linear infinite;
 color: gold;
 font-size: 5em;
}

@keyframes unstuck-butter {
 0%{
 transform: translateY(0px) scale(1.2);
 }
 75%{
 transform: translateY(200px) scale(0.5);
 border-bottom: 2px solid gold;
 border-right: 2px solid gold;
 }
 100%{
 transform: translateY(-10px) scale(0.2);
 }
}

</style>
</head>

<body>

<div class="butterstick-container"><img src="https://external-content.duckduckgo.com/iu/?u=https%3A%2F%2Fstatic.vecteezy.com%2Fsystem%2Fresources%2Fpreviews%2F049%2F224%2F724%2Foriginal%2Fcreamy-yellow-butter-stick-cut-out-stock-png.png&f=1&nofb=1&ipt=9f7eb929cb727bf4f56eda88ebdd5903ea5e5285b2221b4cfd0bd28e4771d28e"/></div>

<!--BOUNCING BUTTER SLICE-->
<div class="butter-bounce-container">
<span class="bounce1">S</span>
<span class="bounce2">P</span>
<span class="bounce3">I</span>
<span class="bounce4">N</span>
<span class="bounce5">N</span>
<span class="bounce6">I</span>
<span class="bounce7">N</span>
<span class="bounce8">G</span>
<span class="bounce9">-</span>
<span class="bounce10">B</span>
<span class="bounce11">U</span>
<span class="bounce12">T</span>
<span class="bounce13">T</span>
<span class="bounce14">E</span>
<span class="bounce15">R</span>
</div>

</body>
</html>
